<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#9bbc0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tamagotchi">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <title>Tamagotchi</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="device">
    <header class="screen-frame">
      <div class="screen" id="screen">
        <div class="hud">
          <span class="hud-name" id="hud-name">tama</span>
          <span class="hud-stage" id="hud-stage">egg</span>
          <span class="hud-age" id="hud-age">0y</span>
        </div>

        <div class="night-sky" aria-hidden="true">
          <span class="moon">☾</span>
          <span class="star s1">✦</span>
          <span class="star s2">✦</span>
          <span class="star s3">✦</span>
        </div>

        <div class="stage" id="stage">
          <svg class="pet" id="pet" viewBox="0 0 32 32" aria-hidden="true"></svg>
          <div class="poops" id="poops"></div>
          <div class="zzz" id="zzz" aria-hidden="true">
            <span>z</span><span>z</span><span>z</span>
          </div>
          <div class="alert" id="alert" aria-hidden="true">!</div>
          <div class="sick-cross" id="sick-cross" aria-hidden="true">+</div>
          <div class="floaty" id="floaty" aria-hidden="true"></div>
        </div>

        <div class="meters">
          <div class="meter-row">
            <span class="meter-label">hunger</span>
            <span class="hearts" id="hearts-hunger"></span>
          </div>
          <div class="meter-row">
            <span class="meter-label">happy</span>
            <span class="hearts" id="hearts-happy"></span>
          </div>
          <div class="meter-row">
            <span class="meter-label">discipline</span>
            <span class="discipline" id="discipline-pips"></span>
          </div>
        </div>

        <div class="ticker" id="ticker">welcome</div>

        <div class="modal" id="play-modal" hidden>
          <div class="modal-title" id="play-title">round 1 of 5</div>
          <div class="modal-pet">
            <svg class="play-pet" id="play-pet" viewBox="0 0 32 32" aria-hidden="true"></svg>
          </div>
          <div class="modal-buttons">
            <button class="btn" data-guess="left">←</button>
            <button class="btn" data-guess="right">→</button>
          </div>
          <div class="modal-track" id="play-track"></div>
        </div>

        <div class="modal" id="status-modal" hidden>
          <div class="modal-title">status</div>
          <pre class="status-body" id="status-body"></pre>
          <button class="btn" id="status-close">close</button>
        </div>
      </div>
    </header>

    <section class="pad">
      <button class="btn" data-act="feed-meal">meal</button>
      <button class="btn" data-act="feed-snack">snack</button>
      <button class="btn" data-act="play">play</button>
      <button class="btn" data-act="clean">clean</button>
      <button class="btn" data-act="heal">heal</button>
      <button class="btn" data-act="discipline">scold</button>
      <button class="btn" data-act="lights">lights</button>
      <button class="btn" data-act="status">status</button>
    </section>

    <section class="pad-2">
      <button class="btn danger" data-act="reset">reset</button>
    </section>

    <section class="dev-pad" id="dev-pad" hidden>
      <span class="dev-label">FAST-FORWARD</span>
      <button class="btn dev" data-ff="10">+10m</button>
      <button class="btn dev" data-ff="60">+1h</button>
      <button class="btn dev" data-ff="360">+6h</button>
      <button class="btn dev" data-ff="1440">+1d</button>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
