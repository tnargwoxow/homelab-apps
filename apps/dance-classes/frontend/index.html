<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fbcfe8" />
    <title>Mimi's Dance Wonderland</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;500;600;700&family=Cinzel:wght@500;700&family=Manrope:wght@400;600;700&family=Bebas+Neue&family=Anton&family=Inter:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply saved theme before paint to avoid a flash of the default theme.
      try {
        var t = localStorage.getItem('mimi-theme');
        if (t === 'ballet' || t === 'heels' || t === 'hiphop') {
          document.documentElement.setAttribute('data-theme', t);
        }
      } catch (_) { /* ignore */ }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
