services:
  dance-classes:
    build: .
    image: dance-classes:local
    container_name: dance-classes
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ${VIDEOS_HOST_PATH:?set VIDEOS_HOST_PATH in .env}:/videos:ro
      - ./data:/data
    environment:
      VIDEOS_DIR: /videos
      DATA_DIR: /data
      PORT: "8080"
      THUMB_CONCURRENCY: "1"
      PROBE_CONCURRENCY: "2"
      LOG_LEVEL: info
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
