services:
  dance-classes:
    build: .
    image: mimis-dance-wonderland:local
    container_name: mimis-dance-wonderland
    restart: unless-stopped
    # Host networking is required so the app can browse mDNS for Chromecasts
    # on the LAN. Plex/Jellyfin/Home Assistant run the same way for the same
    # reason. With host networking the container shares the LXC's IP and
    # listens directly on $PORT — no `ports:` block.
    network_mode: host
    volumes:
      - ${VIDEOS_HOST_PATH:?set VIDEOS_HOST_PATH in .env}:/videos:ro
      - ./data:/data
    environment:
      VIDEOS_DIR: /videos
      DATA_DIR: /data
      PORT: "8080"
      # ffmpeg is single-threaded per worker; raise this to use more cores
      # during the initial thumbnail pass. Idle CPU is unaffected since
      # workers only run when there are pending videos.
      THUMB_CONCURRENCY: "2"
      PROBE_CONCURRENCY: "2"
      LOG_LEVEL: info
      # Optional: explicit URL the Chromecast will hit for streams. Defaults
      # to the Host header from the request, which is the LAN IP your phone
      # connected to. Override if the app sits behind a reverse proxy.
      # PUBLIC_BASE_URL: "http://192.168.1.50:8080"
    deploy:
      resources:
        limits:
          memory: 768M
          # Uncomment to throttle CPU; otherwise the container uses whatever
          # cores the LXC has.
          # cpus: "2.0"
