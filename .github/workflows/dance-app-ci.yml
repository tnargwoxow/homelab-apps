name: dance-app CI

on:
  push:
    branches: [main]
    paths:
      - 'dance_app/**'
      - '.github/workflows/dance-app-ci.yml'
  pull_request:
    paths:
      - 'dance_app/**'
      - '.github/workflows/dance-app-ci.yml'

defaults:
  run:
    working-directory: dance_app

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Activate melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Format check
        run: melos run format-check

      - name: Static analysis
        run: melos run analyze

      - name: Tests
        run: melos run test

  web-build-smoke:
    runs-on: ubuntu-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: dart pub global activate melos
      - run: melos bootstrap

      - name: Build web (debug, smoke)
        working-directory: dance_app/app
        run: flutter build web --no-tree-shake-icons
